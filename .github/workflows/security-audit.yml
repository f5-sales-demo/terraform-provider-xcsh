# Weekly dependency security scanning using govulncheck
# Detects known vulnerabilities in Go dependencies
name: Security Audit

on:
  schedule:
    - cron: '17 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        id: vuln
        run: |
          echo "::group::govulncheck output"
          if govulncheck ./... 2>&1 | tee /tmp/vuln-report.txt; then
            echo "::endgroup::"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "::endgroup::"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue for vulnerabilities
        if: steps.vuln.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SERVER_URL_SAFE: ${{ github.server_url }}
          GITHUB_REPO_SAFE: ${{ github.repository }}
        run: |
          REPORT=$(cat /tmp/vuln-report.txt)
          EXISTING=$(gh issue list --label "security" --state open --search "Dependency vulnerabilities detected" --json number --jq length)
          if [ "$EXISTING" -gt "0" ]; then
            echo "Existing security issue found — skipping duplicate"
          else
            gh issue create \
              --title "fix(security): dependency vulnerabilities detected" \
              --label "security" \
              --body "## govulncheck Report

          Automated security scan found vulnerabilities in Go dependencies.

          \`\`\`
          ${REPORT}
          \`\`\`

          **Action:** Update affected dependencies with \`go get -u\` and \`go mod tidy\`.

          ---
          Generated by [Security Audit workflow](${GITHUB_SERVER_URL_SAFE}/${GITHUB_REPO_SAFE}/actions/workflows/security-audit.yml)"
          fi
