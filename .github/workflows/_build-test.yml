# Reusable workflow for building and testing Go code
# Called by: on-merge.yml, ci.yml, sync-openapi.yml
name: Build and Test

on:
  workflow_call:
    inputs:
      go-version-file:
        description: 'Path to go.mod file for version detection'
        type: string
        default: 'go.mod'
      ref:
        description: 'Git ref to checkout'
        type: string
        default: ''
      run-lint:
        description: 'Whether to run golangci-lint'
        type: boolean
        default: false
    outputs:
      success:
        description: 'Whether build and tests passed'
        value: ${{ jobs.build.outputs.success }}

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    outputs:
      success: ${{ steps.result.outputs.success }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Run go mod tidy
        run: |
          scripts/go-retry.sh 3 go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: scripts/go-retry.sh 3 go build -v .

      - name: Test
        run: scripts/go-retry.sh 2 go test -v -race ./internal/...

      - name: Set result
        id: result
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "success=true" >> "$GITHUB_OUTPUT"
          else
            echo "success=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: inputs.run-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Install golangci-lint
        run: |
          # Install golangci-lint binary directly (no Node.js dependencies)
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$(go env GOPATH)/bin"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run golangci-lint
        env:
          GOGC: "20"
        run: |
          # Lint hand-written code only. The generated internal/provider and
          # internal/client packages (// Code generated ... DO NOT EDIT, ~400k
          # lines) OOM the whole-program linters (unused/staticcheck) at default
          # concurrency — exit 143 — which was skipping the on-merge regeneration
          # cascade. Excluding them as targets, plus GOGC=20 and serial
          # concurrency, keeps peak memory bounded.
          # Use directories ({{.Dir}}), not import paths — golangci-lint expects paths.
          pkgs=$(go list -f '{{.Dir}}' ./internal/... . | grep -vE '/internal/(provider|client)$')
          golangci-lint run --timeout=15m --concurrency=1 $pkgs
